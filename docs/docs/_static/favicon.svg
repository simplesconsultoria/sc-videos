<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f48222"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>

  <!-- Videocamera icon (filled, centered) -->
  <g transform="translate(30, 62)">
    <!-- Camera body -->
    <rect x="0" y="0" width="130" height="132" rx="12" fill="url(#accent)"/>
    <!-- Lens/viewfinder triangle -->
    <polygon points="145,22 145,110 200,132 200,0" fill="url(#accent)"/>
    <!-- Play triangle overlay -->
    <polygon points="42,24 42,108 108,66" fill="#000000" opacity="0.45"/>
  </g>
</svg>
