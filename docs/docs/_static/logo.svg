<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f48222"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Accent stripe -->
  <rect x="0" y="0" width="1600" height="4" fill="url(#accent)"/>

  <!-- Glow behind icon -->
  <circle cx="430" cy="450" r="200" fill="#f48222" opacity="0.06"/>

  <!-- Videocamera icon (filled, scaled from Volto videocamera.svg) -->
  <g transform="translate(280, 360)" filter="url(#glow)">
    <!-- Camera body -->
    <rect x="0" y="0" width="200" height="180" rx="16" fill="url(#accent)"/>
    <!-- Lens/viewfinder triangle -->
    <polygon points="220,30 220,150 300,180 300,0" fill="url(#accent)"/>
    <!-- Play triangle overlay on camera body -->
    <polygon points="70,36 70,144 160,90" fill="#000000" opacity="0.5"/>
  </g>

  <!-- SC Videos text -->
  <text font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" fill="white">
    <tspan x="640" y="500" font-size="200" letter-spacing="-4">
      <tspan fill="#f48222">SC</tspan><tspan dx="20">Videos</tspan>
    </tspan>
  </text>

  <!-- Tagline -->
  <text x="650" y="560" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="400" fill="rgba(255,255,255,0.45)" letter-spacing="6">VIDEO SUPPORT FOR PLONE</text>

  <!-- Bottom accent stripe -->
  <rect x="0" y="896" width="1600" height="4" fill="url(#accent)"/>
</svg>
