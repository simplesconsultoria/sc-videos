name: CI

on:
  push:
    paths:
      - "backend/**"
      - "devops/**"
      - "frontend/**"
      - ".github/workflows/*.yml"
      - "*.md"
      - "*.toml"
      - "docker-compose*"
      - "docs/**"

  workflow_dispatch:

jobs:
  config:
    uses: ./.github/workflows/config.yml

  backend:
    uses: ./.github/workflows/backend.yml
    needs:
        - config
    with:
        base-tag: ${{ needs.config.outputs.base-tag }}
        image-name-prefix: ${{ needs.config.outputs.image-name-prefix }}
        image-name-suffix: backend
        python-version: ${{ needs.config.outputs.python-version }}
        plone-version: ${{ needs.config.outputs.plone-version }}
    if: ${{ needs.config.outputs.backend == 'true' }}
    permissions:
      contents: read
      packages: write

  frontend:
    uses: ./.github/workflows/frontend.yml
    needs:
        - config
    with:
        base-tag: ${{ needs.config.outputs.base-tag }}
        image-name-prefix: ${{ needs.config.outputs.image-name-prefix }}
        image-name-suffix: frontend
        node-version: ${{ needs.config.outputs.node-version }}
        volto-version: ${{ needs.config.outputs.volto-version }}
    if: ${{ needs.config.outputs.frontend == 'true' }}
    permissions:
      contents: read
      packages: write

  storybook:
    name: "Storybook"
    uses: ./.github/workflows/tmp-frontend-storybook.yml
    if: ${{ needs.config.outputs.deploy-docs == 'true' &&always() && github.ref == 'refs/heads/main' && !contains(needs.*.result, 'failure') }}
    needs:
      - config
      - frontend
    with:
      node-version: ${{ needs.config.outputs.node-version }}
      working-directory: "frontend"
      artifacts-store: true

  docs:
    uses: ./.github/workflows/docs.yml
    needs:
        - config
    with:
      python-version: ${{ needs.config.outputs.python-version }}
    # Run when docs changed, or when anything that ends up on the published
    # Pages site changed — we need a fresh docs artifact to deploy alongside
    # Storybook so the combined site doesn't drift.
    if: ${{ needs.config.outputs.deploy-docs == 'true' }}

  deploy-docs:
    name: "Deploy documentation and Storybook"
    uses: ./.github/workflows/tmp-docs-publish.yml
    needs:
        - config
        - docs
        - storybook
    if: ${{ needs.config.outputs.deploy-docs == 'true' &&always() && github.ref == 'refs/heads/main' && !contains(needs.*.result, 'failure') }}
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    with:
      artifacts-docs-name: ${{ needs.docs.outputs.artifacts-name || format('docs-artifacts-{0}', github.ref_name) }}
      artifacts-storybook-name: ${{ needs.storybook.outputs.artifacts-name || format('storybook-artifacts-{0}', github.ref_name) }}

  report:
    name: "Final report"
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - config
      - backend
      - frontend
      - docs
      - storybook
      - deploy-docs
    steps:
      - name: Write report
        run: |
          echo '# Workflow Report' >> $GITHUB_STEP_SUMMARY
          echo '| Job ID | Conclusion |' >> $GITHUB_STEP_SUMMARY
          echo '| --- | --- |' >> $GITHUB_STEP_SUMMARY
          echo '| config | ${{ needs.config.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| backend | ${{ needs.backend.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| frontend | ${{ needs.frontend.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| storybook | ${{ needs.storybook.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| docs | ${{ needs.docs.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| deploy-docs | ${{ needs.deploy-docs.result }} |' >> $GITHUB_STEP_SUMMARY
