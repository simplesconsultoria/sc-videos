name: CI

on:
  push:
    paths:
      - "backend/**"
      - "devops/**"
      - "frontend/**"
      - ".github/workflows/*.yml"
      - "*.md"
      - "*.toml"
      - "docker-compose*"
      - "docs/**"
      - .readthedocs.yaml

  workflow_dispatch:

jobs:
  config:
    uses: ./.github/workflows/config.yml

  backend:
    uses: ./.github/workflows/backend.yml
    needs:
        - config
    with:
        base-tag: ${{ needs.config.outputs.base-tag }}
        image-name-prefix: ${{ needs.config.outputs.image-name-prefix }}
        image-name-suffix: backend
        python-version: ${{ needs.config.outputs.python-version }}
        plone-version: ${{ needs.config.outputs.plone-version }}
    if: ${{ needs.config.outputs.backend == 'true' }}
    permissions:
      contents: read
      packages: write

  docs:
    uses: ./.github/workflows/docs.yml
    needs:
        - config
    with:
      python-version: ${{ needs.config.outputs.python-version }}
    # Run when docs changed, or when anything that ends up on the published
    # Pages site changed — we need a fresh docs artifact to deploy alongside
    # Storybook so the combined site doesn't drift.
    if: ${{ needs.config.outputs.docs == 'true' || needs.config.outputs.deploy-docs == 'true' }}

  frontend:
    uses: ./.github/workflows/frontend.yml
    needs:
        - config
    with:
        base-tag: ${{ needs.config.outputs.base-tag }}
        image-name-prefix: ${{ needs.config.outputs.image-name-prefix }}
        image-name-suffix: frontend
        node-version: ${{ needs.config.outputs.node-version }}
        volto-version: ${{ needs.config.outputs.volto-version }}
    # Same reasoning as `docs` above — keeps the Storybook artifact fresh
    # when the Pages site is about to be redeployed.
    if: ${{ needs.config.outputs.frontend == 'true' || needs.config.outputs.deploy-docs == 'true' }}
    permissions:
      contents: read
      packages: write

  deploy-docs:
    name: "Deploy documentation and Storybook"
    uses: ./.github/workflows/tmp-docs-publish.yml
    needs:
        - config
        - docs
        - frontend
    # Run when we're on main AND at least one of docs/frontend actually
    # produced something, AND nothing upstream failed. The artifact fallback
    # inside the publish workflow lets us keep the other half of the site
    # fresh from the most recent successful main run.
    if: >-
      ${{
        github.ref == 'refs/heads/main' &&
        !cancelled() &&
        !contains(needs.*.result, 'failure') &&
        (needs.docs.result == 'success' || needs.frontend.result == 'success')
      }}
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    with:
      artifacts-docs-name: ${{ needs.docs.outputs.artifacts-name || format('docs-artifacts-{0}', github.ref_name) }}
      artifacts-storybook-name: ${{ needs.frontend.outputs.storybook-artifacts-name || format('storybook-artifacts-{0}', github.ref_name) }}

  report:
    name: "Final report"
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - config
      - backend
      - frontend
      - docs
      - deploy-docs
    steps:
      - name: Write report
        run: |
          echo '# Workflow Report' >> $GITHUB_STEP_SUMMARY
          echo '| Job ID | Conclusion |' >> $GITHUB_STEP_SUMMARY
          echo '| --- | --- |' >> $GITHUB_STEP_SUMMARY
          echo '| config | ${{ needs.config.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| backend | ${{ needs.backend.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| frontend | ${{ needs.frontend.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| docs | ${{ needs.docs.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| deploy-docs | ${{ needs.deploy-docs.result }} |' >> $GITHUB_STEP_SUMMARY
